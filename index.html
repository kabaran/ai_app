<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>関数電卓</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #7a6000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .calc {
      background: #ffd700;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 380px;
    }

    h1 {
      text-align: center;
      font-size: 1rem;
      color: #7a6000;
      margin-bottom: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .display {
      background: #e6b800;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
      text-align: right;
    }

    .display .expr {
      font-size: 0.8rem;
      color: #5a4500;
      min-height: 1.2em;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      font-size: 2rem;
      color: #1a1a1a;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      padding: 14px 0;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
      font-weight: 500;
    }

    button:active { transform: scale(0.92); filter: brightness(0.82); }

    .btn-num   { background: #fff176; color: #333; }
    .btn-op    { background: #f9a825; color: #fff; }
    .btn-eq    { background: #e65100; color: #fff; }
    .btn-clear { background: #ffca28; color: #333; }
    .btn-fn    { background: #ffe082; color: #5a4500; font-size: 0.78rem; }
    .btn-const { background: #ffb300; color: #fff; font-size: 0.82rem; }

    .span2 { grid-column: span 2; }
  </style>
</head>
<body>
<div class="calc">
  <h1>関数電卓</h1>
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="grid">
    <!-- Row 1: scientific functions -->
    <button class="btn-fn" onclick="fn('sin')">sin</button>
    <button class="btn-fn" onclick="fn('cos')">cos</button>
    <button class="btn-fn" onclick="fn('tan')">tan</button>
    <button class="btn-fn" onclick="fn('log')">log</button>
    <button class="btn-fn" onclick="fn('ln')">ln</button>

    <!-- Row 2: more functions -->
    <button class="btn-fn" onclick="fn('sqrt')">√</button>
    <button class="btn-fn" onclick="fn('sq')">x²</button>
    <button class="btn-fn" onclick="fn('inv')">1/x</button>
    <button class="btn-fn" onclick="fn('fact')">n!</button>
    <button class="btn-fn" onclick="fn('abs')">|x|</button>

    <!-- Row 3: constants + clear -->
    <button class="btn-const" onclick="insertConst(Math.PI)">π</button>
    <button class="btn-const" onclick="insertConst(Math.E)">e</button>
    <button class="btn-clear" onclick="backspace()">⌫</button>
    <button class="btn-clear" onclick="clearAll()" style="grid-column:span 2">AC</button>

    <!-- Row 4: num + ops -->
    <button class="btn-clear" onclick="toggleSign()">+/-</button>
    <button class="btn-clear" onclick="percent()">%</button>
    <button class="btn-op"    onclick="op('^')">x^y</button>
    <button class="btn-op"    onclick="op('/')">÷</button>
    <button class="btn-op"    onclick="op('*')">×</button>

    <!-- Row 5 -->
    <button class="btn-num" onclick="num('7')">7</button>
    <button class="btn-num" onclick="num('8')">8</button>
    <button class="btn-num" onclick="num('9')">9</button>
    <button class="btn-op"  onclick="op('-')" style="grid-row:span 2">−</button>
    <button class="btn-op"  onclick="op('+')" style="grid-row:span 2">+</button>

    <!-- Row 6 -->
    <button class="btn-num" onclick="num('4')">4</button>
    <button class="btn-num" onclick="num('5')">5</button>
    <button class="btn-num" onclick="num('6')">6</button>

    <!-- Row 7 -->
    <button class="btn-num" onclick="num('1')">1</button>
    <button class="btn-num" onclick="num('2')">2</button>
    <button class="btn-num" onclick="num('3')">3</button>
    <button class="btn-eq"  onclick="equals()" style="grid-row:span 2">=</button>
    <button class="btn-op"  onclick="op('mod')">mod</button>

    <!-- Row 8 -->
    <button class="btn-num span2" onclick="num('0')">0</button>
    <button class="btn-num" onclick="dot()">.</button>
    <button class="btn-fn"  onclick="insertConst(Math.PI*2)">2π</button>
  </div>
</div>

<script>
  let current = '0';
  let stored  = null;
  let operator = null;
  let justCalc = false;
  let pendingFn = null;

  const elResult = document.getElementById('result');
  const elExpr   = document.getElementById('expr');

  function update() { elResult.textContent = current; }

  function num(d) {
    if (justCalc) { current = d; justCalc = false; }
    else current = (current === '0' ? d : current + d);
    update();
  }

  function dot() {
    if (justCalc) { current = '0.'; justCalc = false; update(); return; }
    if (!current.includes('.')) current += '.';
    update();
  }

  function backspace() {
    if (current === 'エラー') { current = '0'; update(); return; }
    current = current.length > 1 ? current.slice(0, -1) : '0';
    update();
  }

  function op(o) {
    if (stored !== null && !justCalc) calc();
    stored = parseFloat(current);
    operator = o;
    justCalc = true;
    const sym = {'+':'+', '-':'−', '*':'×', '/':'÷', '^':'^ ', 'mod':'mod'}[o];
    elExpr.textContent = `${stored} ${sym}`;
  }

  function calc() {
    if (stored === null || operator === null) return;
    const a = stored, b = parseFloat(current);
    let r;
    switch (operator) {
      case '+':   r = a + b; break;
      case '-':   r = a - b; break;
      case '*':   r = a * b; break;
      case '/':   r = b === 0 ? 'エラー' : a / b; break;
      case '^':   r = Math.pow(a, b); break;
      case 'mod': r = b === 0 ? 'エラー' : a % b; break;
    }
    const sym = {'+':'+', '-':'−', '*':'×', '/':'÷', '^':'^', 'mod':'mod'}[operator];
    elExpr.textContent = `${a} ${sym} ${b} =`;
    current = (typeof r === 'number') ? fmtNum(r) : r;
    stored = null; operator = null; justCalc = true;
    update();
  }

  function equals() { calc(); }

  function fn(name) {
    const v = parseFloat(current);
    let r;
    switch (name) {
      case 'sin':  r = Math.sin(v * Math.PI / 180); break;
      case 'cos':  r = Math.cos(v * Math.PI / 180); break;
      case 'tan':  r = Math.tan(v * Math.PI / 180); break;
      case 'log':  r = v <= 0 ? 'エラー' : Math.log10(v); break;
      case 'ln':   r = v <= 0 ? 'エラー' : Math.log(v); break;
      case 'sqrt': r = v < 0  ? 'エラー' : Math.sqrt(v); break;
      case 'sq':   r = v * v; break;
      case 'inv':  r = v === 0 ? 'エラー' : 1 / v; break;
      case 'fact': r = factorial(v); break;
      case 'abs':  r = Math.abs(v); break;
    }
    elExpr.textContent = `${name}(${v}) =`;
    current = (typeof r === 'number') ? fmtNum(r) : r;
    justCalc = true;
    update();
  }

  function factorial(n) {
    if (n < 0 || !Number.isInteger(n) || n > 170) return 'エラー';
    if (n === 0 || n === 1) return 1;
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
  }

  function insertConst(v) {
    current = fmtNum(v);
    justCalc = false;
    update();
  }

  function fmtNum(v) {
    if (!isFinite(v)) return 'エラー';
    const s = parseFloat(v.toFixed(10));
    return String(s);
  }

  function clearAll() {
    current = '0'; stored = null; operator = null; justCalc = false;
    elExpr.textContent = '';
    update();
  }

  function toggleSign() {
    if (current === '0' || current === 'エラー') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    update();
  }

  function percent() {
    current = fmtNum(parseFloat(current) / 100);
    update();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') num(e.key);
    else if (e.key === '.') dot();
    else if (e.key === '+') op('+');
    else if (e.key === '-') op('-');
    else if (e.key === '*') op('*');
    else if (e.key === '/') { e.preventDefault(); op('/'); }
    else if (e.key === '^') op('^');
    else if (e.key === 'Enter' || e.key === '=') equals();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') backspace();
  });
</script>
</body>
</html>
